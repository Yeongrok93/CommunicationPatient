name: Keep Render backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          if [ -z "${{ vars.RENDER_URL }}" ]; then
            echo "RENDER_URL repository variable is not set. Skipping."
            exit 1
          fi
          curl -sS -f "${{ vars.RENDER_URL }}/api/health"
